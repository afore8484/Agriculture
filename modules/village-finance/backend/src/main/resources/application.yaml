spring:
  application:
    name: ${APP_NAME:village-finance-backend}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${APP_PORT:48080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
